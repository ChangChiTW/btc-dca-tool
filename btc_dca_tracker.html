<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>BTC DCA Tracker</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial;

        max-width: 600px;

        margin: auto;

        padding: 16px;

        background: #fafafa;
      }

      h2 {
        text-align: center;
      }

      input,
      button {
        width: 100%;

        padding: 14px;

        margin: 8px 0;

        font-size: 17px;

        border-radius: 12px;

        border: 1px solid #ddd;
      }

      button {
        background: #111;

        color: white;

        border: none;
      }

      .card {
        background: white;

        padding: 16px;

        border-radius: 16px;

        margin-top: 15px;

        box-shadow: 0 2px 10px #ddd;
      }

      .big {
        font-size: 28px;

        font-weight: bold;
      }

      .green {
        color: green;
      }

      .red {
        color: red;
      }

      .month {
        padding: 12px;

        border-bottom: 1px solid #eee;
      }

      table {
        width: 100%;

        font-size: 14px;
      }

      td,
      th {
        padding: 8px;

        text-align: center;
      }
    </style>
  </head>

  <body>
    <h2>₿ BTC 熊市 DCA</h2>

    <div class="card">
      日期

      <input id="date" type="date" />

      FGI

      <input id="fgi" type="number" />

      <div id="fgiStatus"></div>

      <button onclick="calculate()">計算今日投入</button>
    </div>

    <div class="card" id="result">等待計算</div>

    <div class="card">
      <h3>💰 總資金</h3>

      <div id="fund"></div>
    </div>

    <div class="card">
      <h3>📅 每月進度</h3>

      <div id="monthly"></div>
    </div>

    <div class="card">
      <h3>📒 投入紀錄</h3>

      <table>
        <tr>
          <th>日期</th>

          <th>FGI</th>

          <th>B</th>

          <th>Total</th>
        </tr>

        <tbody id="history"></tbody>
      </table>

      <button onclick="clearData()">清除紀錄</button>
    </div>

    <script>
      const totalBudget = 12000

      const monthlyB = {
        7: 1000,

        8: 1200,

        9: 1400,

        10: 2400,

        11: 1410,
      }

      let records = JSON.parse(localStorage.getItem('btc_records')) || []

      async function getFGI() {
        try {
          let res = await fetch('https://api.alternative.me/fng/?limit=1')

          let data = await res.json()

          let value = Number(data.data[0].value)

          fgi.value = value

          fgiStatus.innerHTML = `

市場：

<b>${data.data[0].value_classification}</b>

<br>

FGI = ${value}

`
        } catch {
          fgiStatus.innerHTML = 'FGI取得失敗，請手動輸入'
        }
      }

      function getB(fgi) {
        if (fgi < 5) return 130

        if (fgi < 15) return 90

        if (fgi < 30) return 60

        if (fgi < 50) return 25

        return 0
      }

      function getMonthInfo(month) {
        let previous = 0

        for (let m = 7; m < month; m++) {
          let quota = monthlyB[m] || 0

          let used = records

            .filter(x => new Date(x.date).getMonth() + 1 === m)

            .reduce((a, b) => a + b.B, 0)

          previous += Math.max(0, quota - used)
        }

        return previous
      }

      function calculate() {
        let dateValue = date.value

        let fgiValue = Number(fgi.value)

        let month = new Date(dateValue).getMonth() + 1

        let quota = (monthlyB[month] || 0) + getMonthInfo(month)

        let used = records

          .filter(x => new Date(x.date).getMonth() + 1 === month)

          .reduce((a, b) => a + b.B, 0)

        let B = getB(fgiValue)

        let remain = Math.max(0, quota - used)

        if (B > remain) B = remain

        let total = 30 + B

        records.push({
          date: dateValue,

          fgi: fgiValue,

          B,

          total,
        })

        localStorage.setItem(
          'btc_records',

          JSON.stringify(records),
        )

        show()
      }

      function show() {
        let usedTotal = records.reduce((a, b) => a + b.total, 0)

        fund.innerHTML = `

已投入：

<div class="big">

${usedTotal} USDT

</div>


剩餘：

<b>${totalBudget - usedTotal}</b>

USDT


<br><br>


完成：

<b>${((usedTotal / totalBudget) * 100).toFixed(1)}%</b>

`

        let html = ''

        records.forEach(x => {
          html += `

<tr>

<td>${x.date}</td>

<td>${x.fgi}</td>

<td>${x.B}</td>

<td>${x.total}</td>

</tr>

`
        })

        history.innerHTML = html

        let mhtml = ''

        for (let m = 7; m <= 11; m++) {
          let carry = getMonthInfo(m)

          let quota = monthlyB[m] + carry

          let usedB = records

            .filter(x => new Date(x.date).getMonth() + 1 === m)

            .reduce((a, b) => a + b.B, 0)

          let total = records

            .filter(x => new Date(x.date).getMonth() + 1 === m)

            .reduce((a, b) => a + b.total, 0)

          mhtml += `

<div class="month">


<b>${m}月</b>


<br>

B額度：
${quota}


<br>

已使用B：
${usedB}


<br>

剩餘B：
<span class="${quota - usedB > 0 ? 'green' : 'red'}">

${quota - usedB}

</span>


<br><br>


當月投入：

${total} USDT



</div>


`
        }

        monthly.innerHTML = mhtml
      }

      function clearData() {
        if (confirm('確定清除？')) {
          localStorage.clear()

          records = []

          show()
        }
      }

      date.value = new Date()

        .toISOString()

        .slice(0, 10)

      getFGI()

      show()
    </script>
  </body>
</html>
